name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix latest.yml
        run: node scripts/fix-latest-yml.js

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: "See https://github.com/0Srp/Crosshair0/releases for details"
          files: |
            dist/Crosshair0*.exe
            dist/Crosshair0*.exe.blockmap
            dist/latest.yml
          fail_on_unmatched_files: true
