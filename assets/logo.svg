<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="out" result="glowOnly"/>
      <feMerge>
        <feMergeNode in="glowOnly"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" stroke="url(#border)" stroke-width="2"/>

  <!-- Subtle radial glow behind crosshair -->
  <circle cx="256" cy="256" r="180" fill="url(#ringGlow)"/>

  <!-- Outer ring with gradient -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="256" r="122" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Inner precision ring -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 6"/>

  <!-- Center dot with glow -->
  <circle cx="256" cy="256" r="6" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="12" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.4"/>

  <!-- Crosshair lines - top -->
  <line x1="256" y1="40" x2="256" y2="166" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="256" y1="40" x2="256" y2="166" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Crosshair lines - bottom -->
  <line x1="256" y1="346" x2="256" y2="472" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="256" y1="346" x2="256" y2="472" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Crosshair lines - left -->
  <line x1="40" y1="256" x2="166" y2="256" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="40" y1="256" x2="166" y2="256" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Crosshair lines - right -->
  <line x1="346" y1="256" x2="472" y2="256" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="346" y1="256" x2="472" y2="256" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Diagonal subtle marks -->
  <line x1="140" y1="140" x2="210" y2="210" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="302" y1="302" x2="372" y2="372" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="372" y1="140" x2="302" y2="210" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="210" y1="302" x2="140" y2="372" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- Ticks on outer ring -->
  <line x1="256" y1="124" x2="256" y2="134" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="378" x2="256" y2="388" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="124" y1="256" x2="134" y2="256" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="378" y1="256" x2="388" y2="256" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Corner ticks at 45 degrees -->
  <line x1="181" y1="181" x2="191" y2="191" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="321" y1="321" x2="331" y2="331" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="331" y1="181" x2="321" y2="191" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="191" y1="321" x2="181" y2="331" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
